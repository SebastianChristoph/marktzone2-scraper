# Server / production docker-compose.
# Uses PostgreSQL for all persistent data (no local SQLite volumes needed).
# Usage: docker compose -f docker-compose.server.yml up -d

services:
  traefik:
    image: traefik:v3.3
    container_name: scraper-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/static.yaml:/etc/traefik/traefik.yaml:ro
      - ./traefik/acme:/acme
    networks:
      - scraper_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scraper_net

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://scraper:${POSTGRES_PASSWORD}@postgres:5432/scraper
      - SCRAPER_DATA_DIR=/app/data
    volumes:
      - ./data/screenshots:/app/data/screenshots
    depends_on:
      - postgres
    networks:
      - scraper_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - scraper_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scraper-ui.rule=Host(`scraper.marktzone.io`)"
      - "traefik.http.routers.scraper-ui.entrypoints=websecure"
      - "traefik.http.routers.scraper-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.scraper-ui.loadbalancer.server.port=80"

networks:
  scraper_net:
    driver: bridge

volumes:
  postgres_data:
